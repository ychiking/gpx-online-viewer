<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>YCHiking - GPX 路線與高度檢視工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    #header {
      padding: 10px 14px;
      background: #f6f6f6;
      border-bottom: 1px solid #ddd;
    }

		#map {
  		height: 450px;     /* 電腦舒適高度 */
		}

		#chartContainer {
      height:  40vh;
      padding: 16px;
		}

		#elevationChart {
			/* width:  100%	!important;
  		height: 350px !important; */
		} 

		#routeInfo {
  		margin-top: 20px;
  		padding: 16px;
  		background: #fafafa;
  		border-top: 1px solid #ddd;
  		font-size: 15px;
  		line-height: 1.8;
		}

    canvas {
      max-height: 100%;
    }
    
    .upload-row {
  		display: flex;
  		align-items: center;
 		 gap: 8px;
		}

		.subtitle {
		  margin-top: 8px;
 		  font-size: 14px;
  		color: #555;
  		line-height: 1.4;
		}
		
		.upload-label {
 			font-size: 13px;   /* 想更小可以 12px */
  		color: #444;
		}
		
@media (max-width: 768px) {

  #map {
    height: 50vh;
  }

  #elevationChart {
    height: 260px !important;
  }

}
		
  </style>
</head>
<body>

<div id="header">
  <div class="upload-row">
		<label for="gpxInput" class="upload-label"><strong>上傳 GPX:</strong></label>
    <input type="file" id="gpxInput" accept=".gpx" />
  </div>

  <div class="subtitle">
    滑鼠移到高度圖或路線顯示座標與時間（UTC+8）<br>
    <strong>YCHiking 簡易版</strong>
  </div>
</div>

<div id="map"></div>
<div id="chartContainer">
	  <canvas id="elevationChart"></canvas>
	  
	<div id="routeInfo">
  <h3>路線資訊</h3>
  <div id="routeSummary"></div>
	</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
