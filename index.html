<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>YCHiking - GPX 路線與高度檢視工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont; }
    #header { padding: 10px 14px; background: #f6f6f6; border-bottom: 1px solid #ddd; }
    #map { height: 400px; cursor: crosshair; }
    #chartContainer { height: 300px; padding: 10px 16px; }
    #routeInfo { margin-top: 5px; padding: 12px 16px; background: #fafafa; border-top: 1px solid #ddd; font-size: 15px; line-height: 1.6; }
    .upload-row { display: flex; align-items: center; gap: 8px; }
    .subtitle { margin-top: 8px; font-size: 14px; color: #555; line-height: 1.4; }
    .upload-label { font-size: 13px; color: #444; }
    /* 航點列表樣式 */
    .wpt-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    .wpt-table th, .wpt-table td { border-bottom: 1px solid #eee; padding: 8px 2px; text-align: left; vertical-align: top; }
    .wpt-table th { color: #666; font-weight: bold; white-space: nowrap; }
    .wpt-link { color: #007bff; text-decoration: underline; cursor: pointer; font-weight: bold; padding: 2px 5px; }
    
    /* A/B 點顯示樣式 (參考截圖樣式) */
    .ab-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    .ab-box { flex: 1; min-width: 250px; border: 1px solid #ccc; border-radius: 4px; padding: 10px; background: white; position: relative; border-left: 4px solid #ddd; }
    .ab-box.active-a { border-left-color: #007bff; }
    .ab-box.active-b { border-left-color: #e83e8c; }
    .ab-box.result { border: 1px solid #007bff; background: #f0f8ff; }
    .clear-btn { position: absolute; right: 10px; top: 10px; cursor: pointer; background: #eee; border: 1px solid #ccc; padding: 2px 8px; font-size: 12px; border-radius: 4px; }
    
		/* A 點按鈕：藍色 */
		  .btn-set-a {
		    background-color: #007bff;
		    color: white;
		    border: none;
		    padding: 6px 12px;
		    border-radius: 4px;
		    cursor: pointer;
		    font-weight: bold;
		    flex: 1;
		    margin-right: 4px;
		  }
		  /* B 點按鈕：粉紅色 */
		  .btn-set-b {
		    background-color: #e83e8c;
		    color: white;
		    border: none;
		    padding: 6px 12px;
		    border-radius: 4px;
		    cursor: pointer;
		    font-weight: bold;
		    flex: 1;
		  }
		  .popup-btn-container {
		    margin-top: 10px;
		    display: flex;
		    gap: 5px;
		  }
		  /* 航點連結樣式 */
		  .wpt-link {
		    color: #007bff;
		    text-decoration: underline;
		    cursor: pointer;
		    font-weight: bold;
		  }
    
		    .ab-header-row {
		    display: flex;
		    align-items: center; /* 垂直置中 */
		    gap: 12px;           /* 文字與按鈕的間距 */
		    margin-bottom: 10px;
		  }
		
		  .ab-title {
		    font-weight: bold;
		    font-size: 16px;
		  }
    
    
	    /* 清除 A/B 總按鈕樣式 */
			.btn-clear-all {
		    padding: 4px 15px;
		    background-color: #6c757d;
		    color: white;
		    border: none;
		    border-radius: 20px; /* 圓角弧度 */
		    font-size: 13px;
		    cursor: pointer;
		    transition: background 0.2s;
		    line-height: 1.5;
		  }
		  .btn-clear-all:hover {
		    background-color: #5a6268;
		  }
		  
		  /* A/B 資訊卡片容器 */
		  .ab-container {
		    display: flex;
		    flex-wrap: wrap;
		    gap: 10px;
		  }
		  
		  /* 讓 A/B 區塊看起來更整齊 */
		  .ab-header {
		    display: flex;
		    justify-content: space-between;
		    align-items: center;
		    width: 100%;
		  }
    
    @media (max-width: 768px) { #map { height: 35vh; } #chartContainer { height: 220px; padding: 5px 10px; } #routeInfo { margin-top: 0; font-size: 14px; } }
  </style>
</head>
<body>
<div id="header">
  <div class="upload-row">
    <label for="gpxInput" class="upload-label"><strong>上傳 GPX:</strong></label>
    <input type="file" id="gpxInput" accept=".gpx" />
  </div>
  <div class="subtitle">
    滑鼠移到高度圖或點擊地圖路徑顯示資訊<br>
    <strong>YCHiking 簡易版</strong>
    <div id="routeSelectContainer" style="display:none; margin-top: 5px;">
      <label for="routeSelect" style="font-weight: bold; margin-right: 5px;">路線:</label>
      <select id="routeSelect" style="padding: 6px 15px; border-radius: 20px; border: 1px solid #ccc; background-color: white; outline: none;"></select>
    </div>
  </div>
</div>
<div id="map"></div>
<div id="chartContainer"><canvas id="elevationChart"></canvas></div>
<div id="routeInfo">
  <div id="routeSummary">尚未讀取資料</div>
  
  <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

  <div class="ab-header-row">
    <span class="ab-title">區間標記設定</span>
    <button class="btn-clear-all" onclick="clearABSettings()">清除 A B 點</button>
  </div>
  
  <div class="ab-container">
    <div id="boxA" class="ab-box active-a" style="flex:1; min-width:250px; border:1px solid #ccc; border-radius:8px; padding:10px; background:white; border-left:5px solid #007bff;">
      <b>A 點</b>
      <div id="infoA" style="font-size:13px; color:#666;">尚未設定</div>
    </div>
    <div id="boxB" class="ab-box active-b" style="flex:1; min-width:250px; border:1px solid #ccc; border-radius:8px; padding:10px; background:white; border-left:5px solid #e83e8c;">
      <b>B 點</b>
      <div id="infoB" style="font-size:13px; color:#666;">尚未設定</div>
    </div>
  </div>

  <div id="boxRes" class="ab-box result" style="display:none; margin-top:10px; border:1px solid #28a745; border-radius:8px; padding:10px; background:#f8fff9;">
    <b style="color:#28a745;">區間分析 (A ↔ B)</b>
    <div id="infoRes" style="font-size:13px;"></div>
  </div>

  <div id="wptList"></div>
</div>
<script src="app.js"></script>
</body>
</html>
