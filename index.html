<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>YCHiking - GPX 路線與高度檢視工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    #header {
      padding: 10px 14px;
      background: #f6f6f6;
      border-bottom: 1px solid #ddd;
    }

    #map {
      height: 400px;
      cursor: crosshair;
    }

    #chartContainer {
      height: 300px; /* 電腦版預設 */
      padding: 10px 16px;
    }

    #routeInfo {
      margin-top: 5px; /* 縮小與圖表之間的間距 */
      padding: 12px 16px;
      background: #fafafa;
      border-top: 1px solid #ddd;
      font-size: 15px;
      line-height: 1.6;
    }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }

    .leaflet-tooltip {
      font-size: 13px;
      padding: 8px;
      border-radius: 4px;
    }
    
    .upload-label {
 			font-size: 13px;   /* 想更小可以 12px */
  		color: #444;
		}

    /* 手機版特別優化 */
    @media (max-width: 768px) {
      #map { height: 35vh; } /* 稍微縮小地圖比例，留給圖表空間 */
      #chartContainer {
        height: 220px; /* 手機版固定高度，避免空白過多 */
        padding: 5px 10px;
      }
      #routeInfo {
        margin-top: 0;
        font-size: 14px; /* 手機版字體微調 */
      }
    }
  </style>
</head>
<body>

<div id="header">
  <div class="upload-row">
    <label for="gpxInput" class="upload-label"><strong>上傳 GPX:</strong></label>
    <input type="file" id="gpxInput" accept=".gpx" />
  </div>

  <div class="subtitle">
    滑鼠移到高度圖或點擊地圖路徑顯示資訊<br>
    <strong>YCHiking 簡易版</strong>
    
    <div id="routeSelectContainer" style="display:none; margin-top: 5px; margin-bottom: 0px;">
      <label for="routeSelect" style="font-weight: bold; margin-right: 5px;">路線:</label>
      <select id="routeSelect" style="padding: 6px 15px; border-radius: 20px; border: 1px solid #ccc; background-color: white; outline: none;"></select>
    </div>
  </div>
</div>

<div id="map"></div>
<div id="chartContainer">
  <canvas id="elevationChart"></canvas>
</div>
<div id="routeInfo">
  <div id="routeSummary">尚未上傳檔案</div>
</div>

<script src="app.js"></script>
</body>
</html>
