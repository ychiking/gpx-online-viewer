<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>YCHiking - GPX 路線與高度檢視工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    #header {
      padding: 10px 14px;
      background: #f6f6f6;
      border-bottom: 1px solid #ddd;
    }

    #map {
      height: 400px;
      cursor: crosshair;
    }

    #chartContainer {
      height: 300px;
      padding: 10px 16px;
    }

    #routeInfo {
      margin-top: 5px;
      padding: 12px 16px;
      background: #fafafa;
      border-top: 1px solid #ddd;
      font-size: 15px;
      line-height: 1.6;
    }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }

		.upload-label {
 			font-size: 13px;   /* 想更小可以 12px */
  		color: #444;
		}

    /* 航點列表樣式 */
    .wpt-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }
    .wpt-table th, .wpt-table td {
      border-bottom: 1px solid #eee;
      padding: 8px 2px;
      text-align: left;
      vertical-align: top;
    }
    .wpt-table th { color: #666; font-weight: bold; white-space: nowrap; }

    /* 序號點擊樣式 */
    .wpt-link {
      color: #007bff;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
      padding: 2px 5px;
    }

    .leaflet-tooltip { font-size: 13px; padding: 8px; border-radius: 4px; }

		#analysisContainer {
    	display: flex;
    	flex-wrap: wrap;
   	 	gap: 20px;
    	background: #fafafa;
    	border-top: 1px solid #ddd;
    	padding: 12px 16px;
  	}
  	.analysis-box {
    	flex: 1;
    	min-width: 250px;
   	 	padding: 10px;
    	background: #fff;
    	border: 1px dashed #ccc;
    	border-radius: 8px;
    	font-size: 14px;
  	}
	  .analysis-result {
	    flex: 1;
	    min-width: 250px;
	    padding: 10px;
	    background: #eef7ff;
	    border: 1px solid #36a2eb;
	    border-radius: 8px;
	    font-size: 14px;
	  }
	  .context-menu {
	    background: white;
	    border: 1px solid #ccc;
	    padding: 5px 0;
	    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
	  }
	  .context-menu-item {
	    padding: 8px 20px;
	    cursor: pointer;
	  }
	  .context-menu-item:hover {
	    background: #f0f0f0;
	  }


    @media (max-width: 768px) {
      #map { height: 35vh; }
      #chartContainer { height: 220px; padding: 5px 10px; }
      #routeInfo { margin-top: 0; font-size: 14px; }
      .wpt-table { font-size: 12px; }
    }
  </style>
</head>
<body>

<div id="header">
  <div class="upload-row">
    <label for="gpxInput" class="upload-label"><strong>上傳 GPX:</strong></label>
    <input type="file" id="gpxInput" accept=".gpx" />
  </div>

  <div class="subtitle">
    滑鼠移到高度圖或點擊地圖路徑顯示資訊<br>
    <strong>YCHiking 簡易版</strong>
    
    <div id="routeSelectContainer" style="display:none; margin-top: 5px; margin-bottom: 0px;">
      <label for="routeSelect" style="font-weight: bold; margin-right: 5px;">路線:</label>
      <select id="routeSelect" style="padding: 6px 15px; border-radius: 20px; border: 1px solid #ccc; background-color: white; outline: none;"></select>
    </div>
  </div>
</div>

<div id="map"></div>
<div id="chartContainer">
  <canvas id="elevationChart"></canvas>
</div>
<div id="routeInfo">
  <div id="routeSummary">尚未上傳檔案</div>
  <div id="analysisContainer">
    <div id="pointAInfo" class="analysis-box">A點：尚未設定</div>
    <div id="pointBInfo" class="analysis-box">B點：尚未設定(請確認B點時間在A點之後)</div>
    <div id="measureResult" class="analysis-result">區間測量：請設定 A、B 點</div>
  </div>
  <div id="wptList"></div>
</div>

<script src="app.js"></script>
</body>
</html>
